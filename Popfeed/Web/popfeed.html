<div id="popfeedConfiguration" class="section">
    <div class="sectionTitle container">
        <h1>Popfeed Configuration</h1>
    </div>

    <div class="paperContainer">
        <div class="paper">
            <h2>Add User</h2>
            <p>Configure a Jellyfin user to sync with Popfeed/Bluesky.</p>

            <form id="popfeedUserForm">
                <div class="formGroup">
                    <label for="userSelect">Jellyfin User</label>
                    <select id="userSelect" required>
                        <option value="">Select a user...</option>
                    </select>
                </div>

                <div class="formGroup">
                    <label for="blueskyHandle">Bluesky Handle (e.g., user.bsky.social)</label>
                    <input type="text" id="blueskyHandle" placeholder="yourhandle.bsky.social" required />
                </div>

                <div class="formGroup">
                    <label for="blueskyAppPassword">Bluesky App Password</label>
                    <input type="password" id="blueskyAppPassword" placeholder="App password from bsky.app" required />
                    <p class="help-text">Create an app password at bsky.app/settings > Advanced > App passwords</p>
                </div>

                <h3>Popfeed Options</h3>
                <div class="checkboxField">
                    <input type="checkbox" id="markWatchedOnPopfeed" checked />
                    <label for="markWatchedOnPopfeed">Mark as watched on Popfeed</label>
                </div>

                <div class="checkboxField subOption">
                    <input type="checkbox" id="postEachEpisode" checked />
                    <label for="postEachEpisode">Post for each episode watched</label>
                </div>

                <div class="checkboxField subOption">
                    <input type="checkbox" id="postOnSeasonComplete" />
                    <label for="postOnSeasonComplete">Post when entire season is completed (instead of per episode)</label>
                </div>

                <h3>Bluesky Options</h3>
                <div class="checkboxField">
                    <input type="checkbox" id="postToBluesky" checked />
                    <label for="postToBluesky">Post to Bluesky when watched</label>
                </div>

                <div class="checkboxField">
                    <input type="checkbox" id="extraLogging" />
                    <label for="extraLogging">Enable extra logging</label>
                </div>

                <button type="submit" class="button">Add User</button>
            </form>
        </div>

        <div class="paper">
            <h2>Configured Users</h2>
            <div id="usersList">
                <p>No users configured.</p>
            </div>
        </div>

        <div class="paper">
            <h2>Test Connection</h2>
            <button type="button" id="testConnectionBtn" class="button">Test Connection</button>
            <div id="testResult" class="test-result"></div>
        </div>
    </div>
</div>
