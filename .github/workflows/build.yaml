name: Build and Release Plugin

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 2)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Install JPRM and yq
      run: |
        pip install --break-system-packages jprm
        wget https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -O /usr/local/bin/yq
        chmod +x /usr/local/bin/yq
    
    - name: Determine Version
      id: version
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          # Get current version from build.yaml and increment
          CURRENT=$(yq eval '.version' build.yaml)
          # Split version and increment patch
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          PATCH=$((PATCH + 1))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"
    
    - name: Update build.yaml version
      run: |
        export VERSION=${{ steps.version.outputs.VERSION }}
        yq -i '.version = env(VERSION)' build.yaml

    - name: Create Artifacts Directory
      run: mkdir -p artifacts

    - name: Build Plugin
      run: jprm --verbosity=debug plugin build . --output=./artifacts --version=${{ steps.version.outputs.VERSION }}
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: popfeed-plugin
        path: artifacts/popfeed_*.zip
        retention-days: 5
    
    - name: Update Manifest
      run: |
        VERSION=${{ steps.version.outputs.VERSION }}
        CHECKSUM=$(md5sum artifacts/popfeed_*.zip | awk '{print $1}')
        RELEASE_DATE=$(date +%Y-%m-%d)
        
        cat > manifest.json << EOF
        [
          {
            "id": "a1b2c3d4-e5f6-7890-abcd-ef1234567890",
            "name": "Popfeed",
            "description": "Sync your Jellyfin watch history with Popfeed and optionally post to Bluesky when you finish watching.",
            "owner": "lguerard",
            "category": "General",
            "versions": [
              {
                "version": "$VERSION",
                "targetAbi": "10.11.0.0",
                "framework": "net9.0",
                "changelog": "$(yq eval '.changelog' build.yaml | tr '\n' '\\n' | sed 's/\\/\\\\/g')",
                "releaseDate": "$RELEASE_DATE",
                "status": "Stable",
                "downloadUrl": "https://github.com/lguerard/jellyfin_popfeed_scrobbler/releases/download/v$VERSION/popfeed_$VERSION.zip",
                "checksum": "$CHECKSUM"
              }
            ]
          }
        ]
        EOF
    
    - name: Commit Version Bump
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Bump version to ${{ steps.version.outputs.VERSION }}"
        file_pattern: build.yaml manifest.json

  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: popfeed-plugin
        path: artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/popfeed_*.zip
        name: Popfeed v${{ needs.build.outputs.version }}
        body: |
          ## What's New
          - Mark watched items on Popfeed (properly marked as finished)
          - Optional posting to Bluesky

          ## Installation
          Upload this zip in Jellyfin plugin settings or add to your plugin manifest.
        tag_name: v${{ needs.build.outputs.version }}
        generate_release_notes: true