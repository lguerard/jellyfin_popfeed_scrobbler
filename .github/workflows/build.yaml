name: '🏗️ Build Plugin'

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/build.yaml@672e46d3ec5096731edbb7581ca872f3d8175cf8

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: artifacts

      - name: Get Version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          CURRENT_TAG="v$VERSION"
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -1 | grep -v "^${CURRENT_TAG}$" || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%aU)" --reverse "$PREV_TAG"..HEAD 2>/dev/null || git log --pretty=format:"- %s (%aU)" --reverse -10)
          else
            COMMITS=$(git log --pretty=format:"- %s (%aU)" --reverse -10)
          fi
          
          # Categorize
          FEATURES=""
          FIXES=""
          OTHER=""
          
          while IFS= read -r commit; do
            [[ -z "$commit" ]] && continue
            if echo "$commit" | grep -qE "^- feat(\([^)]+\))?:"; then
              FEATURES="$FEATURES$commit"$'\n'
            elif echo "$commit" | grep -qE "^- fix(\([^)]+\))?:"; then
              FIXES="$FIXES$commit"$'\n'
            else
              OTHER="$OTHER$commit"$'\n'
            fi
          done <<< "$COMMITS"
          
          # Build using heredoc for proper newlines
          {
            [ -n "$FEATURES" ] && echo "## ✨ New Features" && echo "" && echo "$FEATURES"
            [ -n "$FIXES" ] && echo "## 🐛 Bug Fixes" && echo "" && echo "$FIXES"
            [ -n "$OTHER" ] && echo "## 📝 Other Changes" && echo "" && echo "$OTHER"
            [ -z "$FEATURES" ] && [ -z "$FIXES" ] && [ -z "$OTHER" ] && echo "## Changes" && echo "" && echo "- See full changelog in commit history"
            echo ""
            echo "## 📦 Installation"
            echo ""
            echo "1. Download the zip"
            echo "2. Extract to your Jellyfin plugins folder"
            echo "3. Restart Jellyfin"
          } > release-notes.md
          
          cat release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'jellyfin-popfeed-scrobbler v${{ steps.version.outputs.VERSION }}'
          body_path: release-notes.md
          files: artifacts/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Manifest
        if: github.event_name == 'push'
        run: |
          # Create a temp branch from main, update, commit and push
          git fetch origin main
          git checkout -B tmp-branch origin/main
          
          VERSION=${{ steps.version.outputs.VERSION }}
          ARTIFACT=$(ls artifacts/*.zip | head -1)
          CHECKSUM=$(sha256sum "$ARTIFACT" | cut -d' ' -f1)
          
          # Update manifest.json using jq (manifest.json is an array)
          jq --arg version "$VERSION" \
             --arg url "https://github.com/lguerard/jellyfin_popfeed_scrobbler/releases/download/v${VERSION}/$(basename $ARTIFACT)" \
             --arg checksum "$CHECKSUM" \
             --arg date "$(date -u +%Y-%m-%d)" \
             '.[0].versions[0] |= {"version": $version, "downloadUrl": $url, "checksum": $checksum, "releaseDate": $date}' manifest.json > manifest.json.tmp && mv manifest.json.tmp manifest.json
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --staged --quiet || git commit -m "chore: update manifest for v$VERSION"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/lguerard/jellyfin_popfeed_scrobbler.git tmp-branch:main